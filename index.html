<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content">
    <link rel="icon" type="image/png" href="static/favicon.png">
    <title>Kiwi IRC</title>
    <style>
    /* target specific styles */
    body {
    	/* disable the 'pull down to refresh' on mobiles */
    	overflow: hidden;
    }
    .kiwi-noscript-warn {
        text-align: center;
        font-weight: bold;
        padding: 1em;
    }
    </style>
    <style class="embedly-css">
        .card .hdr {
            display:none;
        }
    </style>

    <!-- relayOS version display -->
    <style>
      .kiwi-welcome-simple-form::after
    ,.kiwi-aboutbuffer::before {
      content:"Version <%= VERSIONSTRING %>";
      display:block;
      text-align:right;
      font-size:0.9em;
      opacity:.5;
    }
    .kiwi-aboutbuffer::before {
      position:absolute;
      right:9px;
    }
    </style>
  </head>
  <body>
    <noscript>
      <div class="kiwi-noscript-warn">
        Please enable JavaScript and refresh the page to use this website.
      </div>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
